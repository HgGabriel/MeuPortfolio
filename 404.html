<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Hiago Gabriel — Desenvolvedor Full-Stack</title>
    <script>
      // GitHub Pages não serve SPAs com rotas próprias: qualquer deep link
      // (ex: /MeuPortfolio/projetos/x) cai neste 404. O script converte o
      // caminho em query string e redireciona para o index, que o desfaz.
      // Padrão spa-github-pages: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // mantém /MeuPortfolio/

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
